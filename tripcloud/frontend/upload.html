<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Trip Post</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo">🧭 TripCloud</h1>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="upload.html">Upload Trip</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="upload-form-section page-section">
            <div class="container page-container">
                <form id="uploadForm" class="form-card" enctype="multipart/form-data">
                    <div class="form-heading">
                        <p class="eyebrow">Captain's log</p>
                        <h2>Upload a New Travel Treasure</h2>
                        <p>Share a destination, food experience, activity, or travel memory with TripCloud.</p>
                    </div>
                    <div class="form-group">
                        <label for="placeName">Place Name</label>
                        <input type="text" id="placeName" name="placeName" required>
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city">
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" name="country" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category">
                            <option value="Destination">Destination</option>
                            <option value="Food">Food</option>
                            <option value="Hotel">Hotel</option>
                            <option value="Activity">Activity</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="rating">Rating</label>
                        <select id="rating" name="rating">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="review">Review</label>
                        <textarea id="review" name="review" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="userName">Your Name</label>
                        <input type="text" id="userName" name="userName" required>
                    </div>
                    <div class="form-group">
                        <label for="file">Upload Image/Video</label>
                        <input type="file" id="photo" name="photo" accept="image/*,video/*" required>
                    </div>
                    <p id="uploadMessage" class="form-message"></p>
                    <div class="form-actions">
                        <button type="submit" class="submit-button btn btn-primary">Upload Trip Post</button>
                        <a href="gallery.html" class="btn btn-secondary gallery-link">Back to Gallery</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>TripCloud - Cloud-native travel media sharing platform</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
